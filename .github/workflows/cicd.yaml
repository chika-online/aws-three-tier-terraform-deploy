name: PODSIX CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-iac:
    runs-on: self-hosted #ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 3️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # 4️⃣ Terraform workflow
      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      # 5️⃣ Install kubectl
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      # 6️⃣ Authenticate kubectl to EKS
      - name: Authenticate to EKS Cluster
        run: aws eks update-kubeconfig --name $(terraform output -raw eks_cluster_name) --region ${{ secrets.AWS_REGION }}

      # 7️⃣ Wait for Helm releases
      - name: Wait for Helm pods
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=ingress-nginx -n ingress-nginx --timeout=600s
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=cert-manager -n cert-manager --timeout=600s
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argo-cd -n argocd --timeout=600s

      # 8️⃣ Apply ClusterIssuer
      - name: Deploy ClusterIssuer
        run: kubectl apply -f ClusterIssuer.yaml

      # 9️⃣ Apply ArgoCD ingress
      - name: Deploy ArgoCD Ingress
        run: kubectl apply -f ingress-argocd.yaml -n argocd

      # # 🔟 Install ArgoCD CLI
